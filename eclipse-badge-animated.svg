<svg width="280" height="70" viewBox="0 0 280 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>

    <!-- Orange glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8c42" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- White highlight -->
    <radialGradient id="highlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Inter font -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

      text {
        font-family: 'Inter', Arial, sans-serif;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="280" height="70" rx="14" fill="url(#bg)" />

  <!-- Animated glow -->
  <circle cx="45" cy="35" r="20" fill="url(#glow)">
    <animate attributeName="r" values="18;22;18" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Eclipse body -->
  <circle cx="45" cy="35" r="13" fill="#000000"/>
  <circle cx="50" cy="35" r="13" fill="#111111"/>

  <!-- White shimmer -->
  <circle cx="38" cy="28" r="6" fill="url(#highlight)">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Title -->
  <text x="85" y="38" font-size="20" fill="#ffffff" font-weight="600">
    ECLIPSE
  </text>

  <!-- Subtitle -->
  <text x="85" y="55" font-size="11" fill="#bbbbbb">
    CORE PLATFORM
  </text>
</svg>
